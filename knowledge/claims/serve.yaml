claims:
  - claim_id: claim_serve_efficiency_over_speed
    statement: Serve quality should be evaluated by efficiency and repeatability, not only speed.
    source_id: skills_of_a_tennis_athlete
    source_tier: T3
    domain: Skill
    skill: serve
    evidence_type: coaching_framework
    confidence: medium
    validation_needed: true
    applicable_age: all
    related_nodes:
      - Skill
      - Metrics
      - Experiment
    notes: Private framework claim. Do not treat as scientific evidence until validated.

  - claim_id: claim_serve_is_skill_not_top_level_domain
    statement: Serve should be modeled as a Skill node rather than a top-level knowledge graph domain.
    source_id: rfc_0001_tennis_knowledge_graph
    source_tier: T0
    domain: Skill
    skill: serve
    evidence_type: internal_architecture_decision
    confidence: high
    validation_needed: false
    applicable_age: all
    related_nodes:
      - Knowledge
      - Skill
      - Drill
      - Metrics
    notes: Internal graph modeling decision from RFC-0001.

  - claim_id: claim_pose_metrics_can_support_serve_review
    statement: Pose-based movement metrics may support future serve review, but need validation against coaching judgment and own video data.
    source_id: tennis_stroke_biomechanics_mediapipe_pose
    source_tier: T1
    domain: Biomechanics
    skill: serve
    evidence_type: scientific_preprint
    confidence: medium
    validation_needed: true
    applicable_age: youth_and_adult
    related_nodes:
      - Biomechanics
      - Metrics
      - Experiment
    notes: Treat as research direction, not production-ready analysis.

  - claim_id: claim_professional_cases_are_variants_not_standards
    statement: Professional serve cases should be treated as high-level implementation variants, not standard answers for junior or adult learners.
    source_id: djokovic_serve_case
    source_tier: T4
    domain: Skill
    skill: serve
    evidence_type: professional_case
    confidence: medium
    validation_needed: true
    applicable_age: all
    related_nodes:
      - Skill
      - Biomechanics
      - Metrics
      - Experiment
    notes: Use elite cases to ask better questions before designing drills.

  - claim_id: claim_serve_case_review_needs_metrics_before_drills
    statement: Serve case review should map observations to metrics and principles before turning them into drills.
    source_id: djokovic_serve_case
    source_tier: T4
    domain: Metrics
    skill: serve
    evidence_type: professional_case
    confidence: medium
    validation_needed: true
    applicable_age: all
    related_nodes:
      - Skill
      - Metrics
      - Drill
      - Experiment
    notes: The initial metrics should include repeatability, point outcome, recovery, and safety constraints.
